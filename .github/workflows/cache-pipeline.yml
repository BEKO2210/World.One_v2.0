                git add data/cache/*.json
                git commit --amend --no-edit 2>/dev/null || true
              }
              sleep $((attempt * 2))
            done
          fi

  # ═══════════════════════════════════════════════════════════
  # PROGRESS-EXT — 05:00 UTC
  # arXiv AI papers, spaceflight news
  # ═══════════════════════════════════════════════════════════
  update-progress-ext:
    if: >-
      github.event.schedule == '0 5 * * *' ||
